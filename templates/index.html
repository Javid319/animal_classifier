<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Classifier - AI-Powered Image Recognition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                <div class="card main-card">
                    <div class="card-header text-center">
                        <h1 class="card-title">
                            <i class="bi bi-image"></i> Animal Classifier
                        </h1>
                        <p class="card-subtitle">Upload an image to identify the animal</p>
                    </div>
                    <div class="card-body">
                        <!-- Upload Section -->
                        <div class="upload-section" id="uploadSection">
                            <div class="upload-area" id="uploadArea">
                                <i class="bi bi-cloud-arrow-up upload-icon"></i>
                                <p class="upload-text">Drag & drop an image here</p>
                                <p class="upload-or">or</p>
                                <label for="imageInput" class="btn btn-primary btn-browse">
                                    <i class="bi bi-folder2-open"></i> Browse Files
                                </label>
                                <input type="file" id="imageInput" accept="image/*" hidden>
                            </div>
                        </div>

                        <!-- Preview Section -->
                        <div class="preview-section" id="previewSection" style="display: none;">
                            <div class="image-preview">
                                <img id="imagePreview" src="" alt="Preview">
                            </div>
                            <div class="preview-actions">
                                <button class="btn btn-outline-secondary" id="clearBtn">
                                    <i class="bi bi-x-lg"></i> Clear
                                </button>
                                <button class="btn btn-primary" id="predictBtn">
                                    <i class="bi bi-search"></i> Predict
                                </button>
                            </div>
                        </div>

                        <!-- Loading Spinner -->
                        <div class="loading-section" id="loadingSection" style="display: none;">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                            <p class="mt-3">Analyzing image...</p>
                        </div>

                        <!-- Result Section -->
                        <div class="result-section" id="resultSection" style="display: none;">
                            <div class="result-card" id="resultCard">
                                <div class="result-icon" id="resultIcon">
                                    <i class="bi bi-check-circle-fill"></i>
                                </div>
                                <h3 class="result-label">Predicted Animal</h3>
                                <h2 class="result-value" id="resultValue">-</h2>
                                <div class="confidence-bar">
                                    <div class="confidence-fill" id="confidenceFill"></div>
                                </div>
                                <p class="confidence-text">Confidence: <span id="confidenceValue">0%</span></p>
                            </div>
                            <button class="btn btn-outline-primary mt-3" id="tryAnotherBtn">
                                <i class="bi bi-arrow-repeat"></i> Try Another Image
                            </button>
                        </div>
                    </div>
                    <div class="card-footer text-center">
                        <p class="supported-text">Supported animals: Buffalo, Elephant, Rhino, Zebra</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/script.js"></script>
</body>
</html>
